<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Register</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Arial, sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
    .card { background: white; padding: 2rem; border-radius: 10px; box-shadow: 0 2px 12px rgba(0,0,0,0.1); width: 100%; max-width: 420px; }
    h1 { margin-bottom: 1.5rem; color: #1F4E79; font-size: 1.5rem; text-align: center; }
    label { display: block; margin-bottom: 0.3rem; font-size: 0.9rem; color: #333; }
    input { width: 100%; padding: 0.6rem 0.8rem; border: 1px solid #ccc; border-radius: 6px; margin-bottom: 1rem; font-size: 1rem; }
    input:focus { outline: none; border-color: #2E75B6; }
    button { width: 100%; padding: 0.75rem; background: #2E75B6; color: white; border: none; border-radius: 6px; font-size: 1rem; cursor: pointer; }
    button:hover { background: #1F4E79; }
    .message { margin-top: 1rem; padding: 0.75rem; border-radius: 6px; text-align: center; font-size: 0.9rem; display: none; }
    .success { background: #d4edda; color: #155724; }
    .error { background: #f8d7da; color: #721c24; }
    .login-link { text-align: center; margin-top: 1rem; font-size: 0.9rem; }
    .login-link a { color: #2E75B6; text-decoration: none; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Create Account</h1>
    <label for="username">Username</label>
    <input type="text" id="username" placeholder="Enter username" />

    <label for="email">Email</label>
    <input type="email" id="email" placeholder="Enter email" />

    <label for="password">Password</label>
    <input type="password" id="password" placeholder="Min 6 characters" />

    <label for="confirm">Confirm Password</label>
    <input type="password" id="confirm" placeholder="Repeat password" />

    <button onclick="register()">Register</button>
    <div class="message" id="message"></div>
    <div class="login-link"><a href="/login">Already have an account? Login</a></div>
  </div>

  <script>
    async function register() {
      const username = document.getElementById("username").value.trim();
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;
      const confirm = document.getElementById("confirm").value;
      const msg = document.getElementById("message");

      msg.style.display = "none";

      // Client-side validation
      if (!username) return showError("Username is required");
      if (!email.includes("@")) return showError("Enter a valid email address");
      if (password.length < 6) return showError("Password must be at least 6 characters");
      if (password !== confirm) return showError("Passwords do not match");

      try {
        const res = await fetch("/auth/register", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ username, email, password })
        });
        const data = await res.json();
        if (res.ok) {
          showSuccess("Account created! Redirecting to login...");
          setTimeout(() => window.location.href = "/login", 1500);
        } else {
          showError(data.detail || data.error || "Registration failed");
        }
      } catch (e) {
        showError("Network error. Please try again.");
      }
    }

    function showError(msg) {
      const el = document.getElementById("message");
      el.textContent = msg;
      el.className = "message error";
      el.style.display = "block";
    }

    function showSuccess(msg) {
      const el = document.getElementById("message");
      el.textContent = msg;
      el.className = "message success";
      el.style.display = "block";
    }
  </script>
</body>
</html>
